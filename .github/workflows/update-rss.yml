name: Update RSS Feed

on:
  # Trigger when markdown files are added/changed in daily-blog/
  push:
    paths:
      - 'daily-blog/*.md'
  
  # Also run daily at 3 PM UTC (in case of manual edits)
  schedule:
    - cron: '0 15 * * *'
  
  # Allow manual triggering
  workflow_dispatch:

jobs:
  update-rss:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies (if needed)
        run: |
          python -m pip install --upgrade pip
          # Add any additional dependencies here if needed
      
      - name: Generate RSS feed
        run: |
          echo "Generating RSS feed..."
          python generate_rss.py
          echo "RSS generation complete"
      
      - name: Check for changes
        id: verify-changed-files
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Commit and push RSS feed
        if: steps.verify-changed-files.outputs.changed == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add rss.xml
          git commit -m "🤖 Auto-update RSS feed - $(date +'%Y-%m-%d %H:%M UTC')"
          git push
      
      - name: Display feed stats
        run: |
          if [ -f "rss.xml" ]; then
            echo "RSS feed generated successfully!"
            echo "File size: $(stat -c%s rss.xml) bytes"
            echo "Number of items: $(grep -c '<item>' rss.xml || echo '0')"
            echo "Last updated: $(date)"
          else
            echo "Warning: RSS file not found"
          fi