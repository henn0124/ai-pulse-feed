name: Build and Deploy Jekyll Blog

on:
  push:
    branches: [ master, main ]
    paths:
      - '_posts/**'
      - '_layouts/**'
      - '_config.yml'
      - 'index.md'
      - 'archive.md'
      - 'Gemfile'
      - 'assets/images/**'
      - 'scripts/**'
      - 'daily-blog/quality-checks/**'
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enforce daily post validator (push only)
        if: github.event_name == 'push'
        run: |
          set -euo pipefail
          CHANGED=$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep '^_posts/.*\.md$' || true)
          if [ -z "$CHANGED" ]; then
            echo "No post files changed; skipping validator"
            exit 0
          fi
          for f in $CHANGED; do
            echo "Validating $f"
            bash scripts/validate-post-v2.sh "$f"
          done

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true

      - name: Install dependencies
        run: bundle install

      - name: Install SVG renderer
        run: sudo apt-get update && sudo apt-get install -y librsvg2-bin

      - name: Render blog images (SVG -> PNG)
        run: bash scripts/render-blog-images.sh

      - name: Build Jekyll site (strict)
        run: bundle exec jekyll build --strict_front_matter --destination ./_site

      - name: Markdown + link reliability checks
        run: |
          grep -R "\[.*\](http" _posts/*.md >/dev/null || { echo "No source links found in posts"; exit 1; }
          gem install html-proofer --no-document
          htmlproofer ./_site --disable-external --enforce-https

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
