name: Build and Deploy Jekyll Blog

on:
  push:
    branches: [ master, main ]
    paths:
      - '_posts/**'
      - '_layouts/**'
      - '_config.yml'
      - 'index.md'
      - 'archive.md'
      - 'Gemfile'
  schedule:
    # Run daily at 3 PM UTC to check for new posts
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true
        
    - name: Install dependencies
      run: |
        bundle install
        
    - name: Build Jekyll site (strict)
      run: |
        bundle exec jekyll build --strict_front_matter --destination ./_site

    - name: Markdown + link reliability checks
      run: |
        # Ensure markdown files with links are well-formed enough for basic parsing
        grep -R "\[.*\](http" _posts/*.md >/dev/null || { echo "No source links found in posts"; exit 1; }
        gem install html-proofer --no-document
        htmlproofer ./_site --disable-external --check-html --enforce-https
        
    - name: Setup Pages
      uses: actions/configure-pages@v4
      
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: ./_site
        
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4