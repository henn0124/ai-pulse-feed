name: Build and Deploy Jekyll Blog with RSS

on:
  # Build the site on any push to main
  push:
    branches: [ main ]
  
  # Build when new posts are added
  push:
    paths:
      - '_posts/*.md'
      - '_config.yml'
      - 'Gemfile*'
      - '_layouts/**'
      - 'index.md'
      - 'archive.md'
  
  # Daily build to catch any updates
  schedule:
    - cron: '0 15 * * *'  # 3 PM UTC daily
  
  # Allow manual triggering
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the in-progress and latest queued.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.1'
          bundler-cache: true
      
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v3
      
      - name: Install dependencies
        run: bundle install
      
      - name: Build Jekyll site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      
      - name: Generate legacy RSS feed (backup)
        run: |
          echo "Generating backup RSS feed using Python script..."
          python generate_rss.py
          # Copy to _site if it doesn't exist there
          if [ -f "rss.xml" ] && [ ! -f "_site/rss.xml" ]; then
            cp rss.xml _site/rss.xml
          fi
      
      - name: Validate site build
        run: |
          echo "Checking Jekyll build output..."
          ls -la _site/
          echo "Checking for RSS feeds..."
          find _site/ -name "*.xml" -type f
          echo "Feed validation:"
          if [ -f "_site/feed.xml" ]; then
            echo "✓ Jekyll feed.xml found"
            echo "Items in Jekyll feed: $(grep -c '<item>' _site/feed.xml || echo '0')"
          fi
          if [ -f "_site/rss.xml" ]; then
            echo "✓ Legacy rss.xml found"
            echo "Items in legacy feed: $(grep -c '<item>' _site/rss.xml || echo '0')"
          fi
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v2
        with:
          path: _site/

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2