<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">Centralized vs Decentralized AI Infrastructure</title>
  <desc id="desc">Side-by-side comparison of centralized and decentralized AI network models.</desc>
  <rect width="1200" height="680" fill="#0f172a"/>
  <text x="60" y="80" fill="#e2e8f0" font-size="38" font-family="Arial, sans-serif" font-weight="700">Centralized vs Decentralized AI Infrastructure</text>
  <rect x="70" y="130" width="480" height="470" rx="16" fill="#1e293b" stroke="#f87171"/>
  <rect x="650" y="130" width="480" height="470" rx="16" fill="#1e293b" stroke="#34d399"/>
  <text x="220" y="185" fill="#fca5a5" font-size="30" font-family="Arial, sans-serif">Centralized</text>
  <text x="800" y="185" fill="#6ee7b7" font-size="30" font-family="Arial, sans-serif">Decentralized</text>
  <circle cx="310" cy="320" r="65" fill="#334155" stroke="#fca5a5"/>
  <circle cx="820" cy="300" r="45" fill="#334155" stroke="#6ee7b7"/>
  <circle cx="960" cy="390" r="45" fill="#334155" stroke="#6ee7b7"/>
  <circle cx="760" cy="430" r="45" fill="#334155" stroke="#6ee7b7"/>
  <circle cx="880" cy="500" r="45" fill="#334155" stroke="#6ee7b7"/>
  <line x1="820" y1="300" x2="960" y2="390" stroke="#6ee7b7" stroke-width="3"/>
  <line x1="760" y1="430" x2="960" y2="390" stroke="#6ee7b7" stroke-width="3"/>
  <line x1="880" y1="500" x2="760" y2="430" stroke="#6ee7b7" stroke-width="3"/>
</svg>
