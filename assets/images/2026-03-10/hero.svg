<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Infrastructure Automation Hero</title>
  <desc id="desc">Abstract diagram of AI agents orchestrating cloud infrastructure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <text x="80" y="170" fill="#e2e8f0" font-size="56" font-family="Arial, sans-serif" font-weight="700">AI Development Infrastructure Revolution</text>
  <text x="80" y="240" fill="#bfdbfe" font-size="30" font-family="Arial, sans-serif">Automated provisioning • Deployment pipelines • Multi-agent orchestration</text>
  <rect x="120" y="320" width="300" height="160" rx="14" fill="#0b1222" stroke="#60a5fa"/>
  <rect x="520" y="320" width="300" height="160" rx="14" fill="#0b1222" stroke="#60a5fa"/>
  <rect x="920" y="320" width="300" height="160" rx="14" fill="#0b1222" stroke="#60a5fa"/>
  <text x="170" y="395" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">AI Agent</text>
  <text x="565" y="395" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Infra Layer</text>
  <text x="995" y="395" fill="#93c5fd" font-size="30" font-family="Arial, sans-serif">Deployment</text>
  <path d="M420 400 L520 400" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <path d="M820 400 L920 400" stroke="#93c5fd" stroke-width="5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#93c5fd"/>
    </marker>
  </defs>
</svg>
